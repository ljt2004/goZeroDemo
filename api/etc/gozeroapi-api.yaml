Name: goZeroApi-api
Host: 0.0.0.0
Port: 8888

UserRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc

# 日志配置
Log:
  ServiceName: gozero-api # 服务名
  Mode: file # 日志模式，可选值：file, console
  Path: ./logs # 日志文件存储路径
  Level: info # 日志级别，可选值：debug, info, warn, error
  KeepDays: 7 # 日志文件保留天数
  Compress: false # 日志文件是否压缩

# 认证配置
Auth:
  AccessSecret: "K9sFd2$gH7jP0zR&mB5nA8qW1eU6tY" # 访问密钥
  AccessExpire: 86400 # 访问过期时间
